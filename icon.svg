<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2a1a5e"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fe2c55"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- AI neural dots background -->
    <circle cx="-80" cy="-80" r="3" fill="#fe2c55" opacity="0.3"/>
    <circle cx="80" cy="-60" r="2" fill="#fe2c55" opacity="0.2"/>
    <circle cx="-60" cy="90" r="2.5" fill="#fe2c55" opacity="0.25"/>
    <circle cx="90" cy="70" r="2" fill="#fe2c55" opacity="0.2"/>
    <circle cx="-100" cy="40" r="1.5" fill="#fe2c55" opacity="0.15"/>
    <!-- Music note -->
    <g fill="url(#note)">
      <!-- Note head (ellipse tilted) -->
      <ellipse cx="-15" cy="30" rx="28" ry="20" transform="rotate(-20, -15, 30)"/>
      <!-- Stem -->
      <rect x="8" y="-80" width="6" height="110" rx="3"/>
      <!-- Flag -->
      <path d="M14,-80 C30,-75 50,-60 40,-45 C35,-50 25,-55 14,-55 Z"/>
    </g>
  </g>
</svg>
