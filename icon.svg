<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2a1a5e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#fe2c55" stroke-width="4" opacity="0.3"/>
  <!-- Double music note (MM) -->
  <g transform="translate(256,270)">
    <!-- Left note -->
    <ellipse cx="-40" cy="40" rx="22" ry="16" fill="#fe2c55" transform="rotate(-15,-40,40)"/>
    <rect x="-36" y="-60" width="8" height="100" rx="3" fill="#fe2c55"/>
    <!-- Right note -->
    <ellipse cx="40" cy="40" rx="22" ry="16" fill="#ffd700" transform="rotate(-15,40,40)"/>
    <rect x="36" y="-60" width="8" height="100" rx="3" fill="#ffd700"/>
    <!-- Flag on left note -->
    <path d="M-28,-58 Q0,-50 -10,-38 Q-20,-38 -28,-46Z" fill="#ff6b6b"/>
    <!-- Flag on right note -->
    <path d="M44,-58 Q72,-50 62,-38 Q52,-38 44,-46Z" fill="#ffd700"/>
  </g>
  <!-- Sound waves above -->
  <g transform="translate(256,140)" stroke="#fe2c55" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M-30,0 Q-15,-20 0,0 Q15,20 30,0" opacity="0.6"/>
    <path d="M-45,-8 Q-22,-32 0,-8 Q22,16 45,-8" opacity="0.4"/>
    <path d="M-60,-16 Q-30,-44 0,-16 Q30,12 60,-16" opacity="0.2"/>
  </g>
  <!-- Small star accents -->
  <circle cx="140" cy="120" r="4" fill="#ffd700" opacity="0.6"/>
  <circle cx="372" cy="120" r="4" fill="#ffd700" opacity="0.6"/>
  <circle cx="100" cy="380" r="3" fill="#fe2c55" opacity="0.4"/>
  <circle cx="412" cy="380" r="3" fill="#fe2c55" opacity="0.4"/>
</svg>
